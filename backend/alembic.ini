# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = app/database/migrations

# template used to generate migration file names; the default is %%(rev)s_%%(slug)s
# file_template = %%(rev)s_%%(slug)s

# sys.path path, used to find python modules.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as
# well as the filename.
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported with relative paths
# relative_import = false

# version locations.  specifies where to find migration version files.
# defaults to script_location/versions.
# version_locations = %(here)s/bar

# version_path_separator = :

# logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S

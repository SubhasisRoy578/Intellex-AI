version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: intellex_ai_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-intellex_ai}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - intellex_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellex_ai_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads:/app/uploads
      - logs:/app/logs
    environment:
      - APP_NAME=Intellex AI
      - APP_ENV=development
      - DEBUG=true
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-intellex_ai}
      - ASYNC_DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-intellex_ai}
      - HOST=0.0.0.0
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - intellex_net

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local

networks:
  intellex_net:
    driver: bridge
